<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Order | Little Gem Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand-logo">LITTLE GEM STORY</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="custom-crystal-bracelets.html">Custom Bracelets</a>
            <a href="gemstone-jewelry.html">Gemstone Jewelry</a>
            <a href="birth-date-element-design.html">Element Design</a>
            <a href="gift-guide.html">Gift Guide</a>
            <a href="custom-order.html" class="btn btn-outline" style="padding: 5px 15px;">Inquiry</a>
        </nav>
        <div class="mobile-menu-btn">☰</div>
    </header>

    <section>
        <h2 class="section-title">Start Your Custom Design</h2>
        <p style="text-align: center; margin-bottom: 40px;">Tell us about yourself, and we will create a piece that resonates with your energy.</p>
        
        <form id="inquiryForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required placeholder="Your Full Name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="Your Email Address">
            </div>
            <div class="form-group">
                <label>Product Type</label>
                <select name="product_type">
                    <option value="crystal_bracelet">Custom Crystal Bracelet</option>
                    <option value="gemstone_jewelry">Gemstone Jewelry Collection</option>
                </select>
            </div>
            <div class="form-group">
                <label>Birth Date</label>
                <input type="date" name="birth_date">
            </div>
            <div class="form-group">
                <label>Zodiac Sign</label>
                <input type="text" name="zodiac" placeholder="e.g. Scorpio">
            </div>
            <div class="form-group">
                <label>Element Preference</label>
                <select name="element">
                    <option value="not_sure">Help me decide</option>
                    <option value="water">Water</option>
                    <option value="fire">Fire</option>
                    <option value="earth">Earth</option>
                    <option value="air">Air</option>
                </select>
            </div>
            <div class="form-group">
                <label>Primary Intention</label>
                <input type="text" name="intention" placeholder="e.g. Peace, Abundance, Protection">
            </div>
            <div class="form-group">
                <label>Color Preference</label>
                <input type="text" name="color" placeholder="e.g. Soft Blues and Clear Quartz">
            </div>
            <div class="form-group">
                <label>Wrist Size</label>
                <input type="text" name="wrist_size" placeholder="e.g. 15cm / Tight Fit">
            </div>
            <div class="form-group">
                <label>Charm Option</label>
                <input type="text" name="charm" placeholder="e.g. Silver Moon, Initial G">
            </div>
            <div class="form-group">
                <label>Gift Occasion</label>
                <input type="text" name="occasion" placeholder="e.g. Birthday, Anniversary">
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" value="1" min="1">
            </div>
            <div class="form-group">
                <label>Budget Range (USD)</label>
                <select name="budget">
                    <option value="50-100">$50 - $100</option>
                    <option value="100-200">$100 - $200</option>
                    <option value="200plus">$200+</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>Message / Special Requests</label>
                <textarea name="message" rows="4"></textarea>
            </div>
            <div class="full-width" style="text-align: center;">
                <button type="submit" class="btn">Submit Inquiry</button>
            </div>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Little Gem Story. Meaningful Jewelry for Your Unique Story.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
